name: "Sparky: Analyze"

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  discussions: write
  id-token: write

jobs:
  analyze:
    if: github.event.label.name == 'sparky'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read SPARKY.md
        id: sparky_md
        run: |
          content=$(cat SPARKY.md 2>/dev/null || echo "")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze with Claude
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: ""
          track_progress: true
          show_full_output: true
          prompt: |
            ${{ steps.sparky_md.outputs.content }}

            You are triaging issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Your task:
            1. Read the issue description carefully
            2. Explore the codebase to understand the relevant code
            3. Identify the root cause (for bugs) or the best approach (for features)
            4. Produce a detailed analysis and plan (your response will be posted as a comment)

            If the issue is unclear, ambiguous, or missing critical details:
            - Use `gh api graphql` to create a GitHub Discussion for refinement:
              a. Get the repo ID and a Q&A or General category ID:
                 gh api graphql -f query='query { repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") { id discussionCategories(first:10) { nodes { id name } } } }'
              b. Create a discussion titled "Sparky Refinement: Issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"
                 with a body that links back to the issue and lists your clarifying questions
              c. Post a comment on the issue: "I have questions before I can propose a plan. I've opened a discussion for refinement: <discussion_url>"
            - If Discussions are not enabled on this repo, fall back to asking clarifying questions directly in this comment
            - Do NOT ask questions directly in the issue comment (unless Discussions are unavailable)

            If the issue is clear enough to plan, your response MUST include:
            - **Summary**: One-line description of what needs to change
            - **Analysis**: What you found in the codebase
            - **Plan**: Numbered list of specific changes (files, functions, logic)
            - **Risks**: Anything that could go wrong or needs careful handling
            - **Estimated scope**: Small / Medium / Large

            End your response with:
            > Comment `@sparky implement` to approve this plan and start implementation.

            IMPORTANT: Do NOT modify any files. Do NOT create branches. Do NOT commit or push. This is a read-only analysis step. Your only job is to analyze and produce a plan.
          claude_args: |
            --disallowedTools "Edit,Write,NotebookEdit,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git rm:*)"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
