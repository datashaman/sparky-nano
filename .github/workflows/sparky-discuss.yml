name: "Sparky: Discuss"

on:
  discussion_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  discussions: write
  id-token: write

jobs:
  discuss:
    if: contains(github.event.comment.body, '@sparky')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read SPARKY.md
        id: sparky_md
        run: |
          content=$(cat SPARKY.md 2>/dev/null || echo "")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Respond in Discussion with Claude
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@sparky"
          track_progress: true
          prompt: |
            ${{ steps.sparky_md.outputs.content }}

            You are responding to a comment in a refinement discussion.

            Discussion title: ${{ github.event.discussion.title }}
            Discussion URL: ${{ github.event.discussion.html_url }}

            Instructions:
            1. Read the comment carefully
            2. If the comment contains `@sparky finalize`:
               - Extract the issue number N from the discussion title
                 (format: "Sparky Refinement: Issue #N — <title>")
               - Gather the full conversation from this discussion to produce the final approved plan
               - Post the final approved plan as an issue comment:
                 gh api repos/${{ github.repository }}/issues/<N>/comments -f body="<final plan>"
               - Include at the end of the plan: "> Comment \`@sparky implement\` to approve this plan and start implementation."
               - Reply in this discussion confirming the plan has been posted to the issue
            3. If the comment contains `@sparky implement`:
               - Explain that `@sparky implement` must be triggered by commenting on the issue, not in a discussion
               - Suggest the user comment `@sparky finalize` here first to post the plan to the issue, then `@sparky implement` on the issue
            4. Otherwise, respond to the question or feedback in this discussion:
               - Explore the codebase if needed to give an accurate answer
               - If asked to revise the plan, post the updated plan here
               - Be helpful and specific — reference actual files, functions, and line numbers

            IMPORTANT:
            - Do NOT modify any files. This is a read-only interaction.
            - Do NOT create branches or pull requests.
          claude_args: |
            --disallowedTools "Edit,Write,NotebookEdit,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git rm:*)"
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
