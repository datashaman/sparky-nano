name: "Sparky: Respond"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  discussions: write
  id-token: write

jobs:
  execute:
    if: |
      !github.event.issue.pull_request
      && contains(github.event.comment.body, '@sparky implement')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read SPARKY.md
        id: sparky_md
        run: |
          content=$(cat SPARKY.md 2>/dev/null || echo "")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Implement with Claude
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@sparky implement"
          track_progress: true
          branch_prefix: "sparky/"
          prompt: |
            ${{ steps.sparky_md.outputs.content }}

            You are implementing the approved plan for issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Instructions:
            1. Read the issue description and all comments (especially the analysis plan)
            2. Implement the changes described in the approved plan
            3. Follow existing code patterns and conventions
            4. Add or update tests for your changes
            5. Ensure all existing tests still pass
            6. Create a pull request with a clear description

            Your PR description MUST include:
            - What was changed and why
            - How it was tested
            - `Fixes #${{ github.event.issue.number }}`

            IMPORTANT:
            - Follow the plan from the analysis step closely
            - Make conservative, minimal changes
            - Do NOT modify CI/CD pipelines unless the issue specifically requests it
            - If the change would exceed ~500 lines, split into smaller PRs and explain the strategy
            - After committing and pushing, create the PR using: gh pr create --title "<title>" --body "<body>" --base main
            - Do NOT just provide a "Create PR" link. Actually create the PR.
            - When running gh pr create, pass the --body as a plain inline string. Do NOT use heredocs, subshells, or cat.
            - Do NOT use # characters in the PR body — they trigger a security check that blocks the command. Use plain text or dashes for headings instead.
            - Only call gh pr create ONCE. If it succeeds, do not retry.
          claude_args: |
            --allowedTools "Bash(gh pr create:*)"
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  interactive:
    if: |
      !github.event.issue.pull_request
      && contains(github.event.comment.body, '@sparky')
      && !contains(github.event.comment.body, '@sparky implement')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read SPARKY.md
        id: sparky_md_interactive
        run: |
          content=$(cat SPARKY.md 2>/dev/null || echo "")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Respond with Claude
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@sparky"
          track_progress: true
          prompt: |
            ${{ steps.sparky_md_interactive.outputs.content }}

            Someone has asked a question or requested a plan revision on issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}

            Instead of answering directly in the issue thread, move this to a GitHub Discussion:
            1. Search for an existing discussion titled "Sparky Refinement: Issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}":
               gh api graphql -f query='query { repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") { discussions(first:20, states:[OPEN]) { nodes { id title url } } } }'
            2. If a matching discussion exists, post your answer as a comment there:
               gh api graphql -f query='mutation { addDiscussionComment(input: { discussionId:"<id>", body:"<answer>" }) { comment { url } } }'
            3. If no matching discussion exists, create one:
               a. Get the repo ID and a Q&A or General category ID:
                  gh api graphql -f query='query { repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") { id discussionCategories(first:10) { nodes { id name } } } }'
               b. Create a discussion titled "Sparky Refinement: Issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"
                  with the question and your answer in the body
            4. Post a brief comment on this issue linking to the discussion:
               "I've moved this to a refinement discussion: <discussion_url>"
            5. If Discussions are not enabled on this repo, fall back to answering here directly

            When the user is ready for implementation, direct them to comment `@sparky implement` on the issue.

            IMPORTANT:
            - Do NOT modify any files. This is a read-only interaction.
            - Do NOT create branches or pull requests.
            - Keep Q&A in the discussion thread to reduce issue clutter.
          claude_args: |
            --disallowedTools "Edit,Write,NotebookEdit,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git rm:*)"
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  review:
    if: |
      (github.event_name == 'pull_request_review_comment')
      || (github.event.issue.pull_request && contains(github.event.comment.body, '@sparky'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read SPARKY.md
        id: sparky_md_review
        run: |
          content=$(cat SPARKY.md 2>/dev/null || echo "")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Respond to review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@sparky"
          track_progress: true
          prompt: |
            ${{ steps.sparky_md_review.outputs.content }}

            You are responding to PR review feedback.

            Instructions:
            1. Read the review comment carefully
            2. Understand what change is being requested
            3. Make the requested changes if reasonable
            4. If the request is unclear, ask a clarifying question
            5. Push fixup commits for any changes made

            IMPORTANT:
            - Address each review comment specifically
            - Keep fixup commits small and focused
            - Explain what you changed in your reply
            - If you disagree with feedback, explain your reasoning but defer to the reviewer
            - Do NOT force-push or rebase — add new commits only
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
